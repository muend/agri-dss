services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri
      POSTGRES_DB: agridss
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri -d agridss"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://agri:agri@db:5432/agridss
      CORS_ORIGINS: "http://localhost:8000,http://localhost:3000,https://tarimsalkoridor.online"
    ports:
      - "8000:8000"

volumes:
  pgdata:
